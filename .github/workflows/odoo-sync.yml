name: Odoo Sync

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: odoo-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      ODOO_URL: ${{ secrets.ODOO_URL }}
      ODOO_DB: ${{ secrets.ODOO_DB }}
      ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
      ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate Odoo Secrets
        id: validate
        run: |
          missing=()
          [[ -z "${ODOO_URL}" ]] && missing+=("ODOO_URL")
          [[ -z "${ODOO_DB}" ]] && missing+=("ODOO_DB")
          [[ -z "${ODOO_USERNAME}" ]] && missing+=("ODOO_USERNAME")
          [[ -z "${ODOO_PASSWORD}" ]] && missing+=("ODOO_PASSWORD")

          if (( ${#missing[@]} > 0 )); then
            echo "::warning::Skipping Odoo sync: missing GitHub secrets: ${missing[*]}"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.validate.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install Dependencies
        if: steps.validate.outputs.ready == 'true'
        run: npm ci
        working-directory: dashboard

      - name: Fetch Odoo Snapshot
        if: steps.validate.outputs.ready == 'true'
        run: npm run fetch:odoo
        working-directory: dashboard

      - name: Commit and Push if Changed
        if: steps.validate.outputs.ready == 'true'
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add dashboard/src/data/odoo-projects.json
            git commit -m "chore: auto-sync Odoo snapshot"
            git push origin HEAD:main
          else
            echo "No Odoo data changes to commit."
          fi
